name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  APP_NAME: fe-perf-lab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # Job 1: 빌드 + 아티팩트 패키징
  # ─────────────────────────────────────────
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - run: npm ci
      - run: npm run build

      - name: Package dist artifact
        run: tar -czf /tmp/dist.tar.gz dist

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact-${{ steps.sha.outputs.sha_short }}
          path: /tmp/dist.tar.gz
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 2: S3 업로드
  # ─────────────────────────────────────────
  upload-to-s3:
    name: Upload to S3
    runs-on: ubuntu-latest
    needs: build-and-package
    env:
      SHA_SHORT: ${{ needs.build-and-package.outputs.sha_short }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-artifact-${{ env.SHA_SHORT }}
          path: /tmp

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload versioned artifact
        run: |
          aws s3 cp /tmp/dist.tar.gz \
            s3://${{ secrets.S3_BUCKET_NAME }}/${{ env.APP_NAME }}/releases/${{ env.SHA_SHORT }}/dist.tar.gz

      - name: Update latest pointer
        run: |
          aws s3 cp /tmp/dist.tar.gz \
            s3://${{ secrets.S3_BUCKET_NAME }}/${{ env.APP_NAME }}/latest/dist.tar.gz
          echo "${{ env.SHA_SHORT }}" | \
            aws s3 cp - s3://${{ secrets.S3_BUCKET_NAME }}/${{ env.APP_NAME }}/latest/CURRENT_SHA

  # ─────────────────────────────────────────
  # Job 3: EC2 배포
  # ─────────────────────────────────────────
  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-package, upload-to-s3]
    env:
      SHA_SHORT: ${{ needs.build-and-package.outputs.sha_short }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: SHA_SHORT
          command_timeout: 5m
          script: |
            set -euo pipefail
            APP="fe-perf-lab"
            BUCKET="${{ secrets.S3_BUCKET_NAME }}"
            DEPLOY="/var/www/labs/${APP}"
            BACKUP="/home/${{ secrets.EC2_USER }}/${APP}-backup"

            echo "=== [1/4] 이전 배포본 백업 ==="
            mkdir -p "${BACKUP}"
            if [ -d "${DEPLOY}" ]; then
              rm -rf "${BACKUP}/last"
              cp -r "${DEPLOY}" "${BACKUP}/last"
            fi

            echo "=== [2/4] 배포 디렉토리 초기화 ==="
            sudo rm -rf "${DEPLOY}" && sudo mkdir -p "${DEPLOY}"
            sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} "${DEPLOY}"

            echo "=== [3/4] S3에서 아티팩트 다운로드 및 압축 해제 ==="
            aws s3 cp "s3://${BUCKET}/${APP}/releases/${SHA_SHORT}/dist.tar.gz" /tmp/dist.tar.gz
            tar -xzf /tmp/dist.tar.gz -C "${DEPLOY}" --strip-components=1
            echo "${SHA_SHORT}" > "${DEPLOY}/DEPLOYED_SHA"

            echo "=== [4/4] nginx 리로드 ==="
            sudo nginx -t && sudo systemctl reload nginx
            echo "=== 배포 완료: ${SHA_SHORT} ==="

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 1m
          script: |
            for i in $(seq 1 6); do
              if curl -fsS http://localhost/fe-perf-lab/; then
                echo "헬스체크 성공"
                exit 0
              fi
              echo "대기 중... ($i/6)"
              sleep 5
            done
            echo "헬스체크 실패"
            exit 1

  # ─────────────────────────────────────────
  # Job 4: 롤백 (deploy-to-ec2 실패 시 자동 실행)
  # ─────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [build-and-package, deploy-to-ec2]
    if: failure() && needs.deploy-to-ec2.result == 'failure'
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            APP="fe-perf-lab"
            DEPLOY="/var/www/labs/${APP}"
            BACKUP="/home/${{ secrets.EC2_USER }}/${APP}-backup"

            if [ -d "${BACKUP}/last" ]; then
              sudo rm -rf "${DEPLOY}"
              sudo cp -r "${BACKUP}/last" "${DEPLOY}"
              sudo nginx -t && sudo systemctl reload nginx
              echo "롤백 완료 (이전 배포본 복원)"
            else
              echo "롤백 실패: 백업본 없음" && exit 1
            fi
